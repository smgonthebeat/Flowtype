<svg xmlns="http://www.w3.org/2000/svg" width="460" height="112" viewBox="0 0 460 112" role="img" aria-labelledby="title description">
  <title id="title">Download Flowtype for Apple Silicon</title>
  <desc id="description">Direct DMG download button for Apple Silicon Macs running macOS 14 or later.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#171b24"/>
      <stop offset="1" stop-color="#090b10"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffb17d"/>
      <stop offset="1" stop-color="#ff8068"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="458" height="110" rx="22" fill="url(#background)" stroke="#3b414d" stroke-width="2"/>
  <rect x="18" y="18" width="76" height="76" rx="19" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.14"/>
  <text x="56" y="73" text-anchor="middle" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif" font-size="48" font-weight="600"></text>
  <text x="116" y="34" fill="#aeb5c2" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif" font-size="11" font-weight="700" letter-spacing="1.8">DOWNLOAD FLOWTYPE FOR</text>
  <text x="114" y="67" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif" font-size="28" font-weight="750">Apple Silicon</text>
  <text x="116" y="89" fill="#aeb5c2" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif" font-size="13" font-weight="500">macOS 14+ · Preview</text>
  <rect x="381" y="42" width="57" height="28" rx="14" fill="url(#accent)"/>
  <text x="409.5" y="61" text-anchor="middle" fill="#17100d" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif" font-size="12" font-weight="800" letter-spacing="0.6">DMG</text>
</svg>
